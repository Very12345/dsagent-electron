<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: system-ui, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e1e2e 0%, #2d2d3d 100%);
    color: #d4d4d4;
    height: 100vh;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 10px;
    font-size: 12px;
    overflow: hidden;
    position: relative;
    border-top: 1px solid #3a3a5a;
}
body.light { background: linear-gradient(135deg, #e8e8f0 0%, #f0f0f5 100%); color: #333; border-top-color: #d0d0d8; }

/* 暂停/连接状态按钮 */
#pause-btn {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid #10b981;
    background: #10b981;
    cursor: pointer;
    flex-shrink: 0;
    transition: all .25s ease;
    position: relative;
}
#pause-btn:hover {
    transform: scale(1.2);
    box-shadow: 0 0 12px rgba(16,185,129,.4);
}
#pause-btn.paused {
    background: #ef4444;
    border-color: #ef4444;
}
#pause-btn.paused:hover {
    box-shadow: 0 0 12px rgba(239,68,68,.4);
}

/* 状态灯内部图标 */
#pause-btn::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 8px; height: 8px;
    border-radius: 2px;
    background: #fff;
    opacity: .9;
    transition: all .2s;
}
#pause-btn.paused::after {
    width: 8px;
    height: 8px;
    border-radius: 0;
    border-left: 3px solid #fff;
    border-right: 3px solid #fff;
    background: transparent;
    border-radius: 1px;
}
body.light #pause-btn { border-color: #059669; background: #059669; }
body.light #pause-btn.paused { border-color: #dc2626; background: #dc2626; }

/* 停止按钮 */
#stop-btn {
    padding: 4px 14px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    color: #fff;
    background: linear-gradient(135deg, #dc2626, #ef4444);
    font-weight: bold;
    white-space: nowrap;
    transition: opacity .2s, transform .1s;
    flex-shrink: 0;
    box-shadow: 0 1px 4px rgba(220,38,38,.3);
}
#stop-btn:active { transform: scale(0.95); }
#stop-btn:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; }
#stop-btn:hover:not(:disabled) { opacity: .85; }

/* 状态文字 - 走马灯效果 */
#status-text {
    flex: 1;
    min-width: 0;
    font-size: 11px;
    color: #8a8aaa;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1;
    transition: color .3s;
}
#status-text.idle { color: #6a6a8a; font-style: italic; }
#status-text.active { color: #22d3ee; font-weight: 500; }
#status-text.done { color: #34d399; font-weight: 500; }
#status-text.error { color: #ef4444; font-weight: 500; }
body.light #status-text { color: #8888aa; }
body.light #status-text.idle { color: #aaa; }

/* 调试区域 */
#debug-toggle {
    padding: 4px 8px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    color: #888;
    background: rgba(255,255,255,0.06);
    flex-shrink: 0;
    transition: all .2s;
    line-height: 1;
}
#debug-toggle:hover { background: rgba(255,255,255,0.12); color: #ddd; }
body.light #debug-toggle { background: rgba(0,0,0,0.05); color: #888; }
body.light #debug-toggle:hover { background: rgba(0,0,0,0.1); }

#debug-panel {
    display: none;
    flex: 1;
    min-width: 0;
    height: 100%;
    align-items: center;
}
#debug-panel.open { display: flex; }

#debug-panel-inner {
    display: flex;
    align-items: center;
    gap: 6px;
    width: 100%;
    height: 100%;
}

#debug-input {
    width: 200px;
    height: 26px;
    border: 1px solid #374151;
    border-radius: 4px;
    background: #11111e;
    color: #d4d4d4;
    padding: 2px 8px;
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 11px;
    outline: none;
    flex-shrink: 0;
}
body.light #debug-input { background: #fff; color: #333; border-color: #ccc; }
#debug-input:focus { border-color: #22d3ee; }

#debug-run {
    padding: 4px 12px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    color: #fff;
    background: #10b981;
    font-weight: bold;
    flex-shrink: 0;
    white-space: nowrap;
}
#debug-run:hover { background: #059669; }
#debug-run:disabled { opacity: .5; cursor: not-allowed; }

#debug-status {
    font-size: 10px;
    color: #6a6a8a;
    flex-shrink: 0;
    white-space: nowrap;
}

#debug-output {
    flex: 1;
    min-width: 0;
    height: 26px;
    border: 1px solid #374151;
    border-radius: 4px;
    background: #11111e;
    color: #d4d4d4;
    padding: 2px 8px;
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 20px;
    display: none;
}
body.light #debug-output { background: #fff; color: #333; border-color: #ccc; }
#debug-output.show { display: block; }
#debug-output.error { color: #ef4444; }
</style>
</head>
<body>
    <!-- 暂停/连接按钮 -->
    <div id="pause-btn" onclick="togglePause()" title="点击暂停/恢复 Agent 操作"></div>

    <!-- 状态文字 -->
    <span id="status-text" class="idle">就绪</span>

    <!-- 停止按钮 -->
    <button id="stop-btn" disabled onclick="doStop()">⏹ 停止</button>

    <!-- 调试按钮 -->
    <button id="debug-toggle" onclick="toggleDebug()" title="WinAPI 调试">⚡</button>

    <!-- 调试面板（内嵌在控制栏内） -->
    <div id="debug-panel">
        <div id="debug-panel-inner">
            <textarea id="debug-input" placeholder='{"action":"list","params":{}}' spellcheck="false"></textarea>
            <button id="debug-run" onclick="runDebug()" disabled>▶ 执行</button>
            <span id="debug-status"></span>
            <div id="debug-output"></div>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        var isPaused = false;

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pause-btn').classList.toggle('paused', isPaused);
            ipcRenderer.send('ctrl-toggle-autoexec', !isPaused);
        }

        function doStop() {
            ipcRenderer.send('ctrl-stop');
            document.getElementById('stop-btn').disabled = true;
            document.getElementById('stop-btn').textContent = '⏹ 停止中';
        }

        // 接收状态更新
        ipcRenderer.on('ctrl-status', (event, data) => {
            // 停止按钮状态
            if (data.buttonState) {
                var isGen = data.buttonState === 'generating';
                document.getElementById('stop-btn').disabled = !isGen;
                document.getElementById('stop-btn').textContent = isGen ? '⏹ 停止' : '⏹';
            }

            // 状态文字
            var statusEl = document.getElementById('status-text');
            var text = '';
            var cls = 'idle';

            switch (data.buttonState) {
                case 'generating':
                    text = 'DeepSeek 正在输出...';
                    cls = 'active';
                    break;
                case 'done':
                    text = '对话完成 ✓';
                    cls = 'done';
                    break;
                case 'sending':
                    text = '正在发送...';
                    cls = 'active';
                    break;
                case 'ready':
                    text = '就绪';
                    cls = 'idle';
                    break;
                default:
                    text = data.statusText || '就绪';
                    cls = 'idle';
            }

            // Qwen 状态覆盖
            if (data.qwenState === 'generating') {
                text = 'Qwen 正在输出...';
                cls = 'active';
            }

            statusEl.textContent = text;
            statusEl.className = cls;
        });

        // 接收通知/状态消息（来自主进程）
        ipcRenderer.on('ctrl-notify', (event, msg) => {
            var statusEl = document.getElementById('status-text');
            statusEl.textContent = msg || '就绪';
            statusEl.className = 'done';
            // 3秒后恢复
            setTimeout(function() {
                statusEl.textContent = '就绪';
                statusEl.className = 'idle';
            }, 3000);
        });

        // 主题
        ipcRenderer.on('ctrl-theme', (event, theme) => {
            document.body.classList.toggle('light', theme === 'light');
        });

        // ========== WinAPI 调试面板 ==========
        var debugOpen = false;
        var debugRunning = false;

        var debugInput = document.getElementById('debug-input');
        var debugRunBtn = document.getElementById('debug-run');
        var debugOutput = document.getElementById('debug-output');
        var debugStatus = document.getElementById('debug-status');
        var debugStatusText = document.getElementById('status-text');
        var debugStopBtn = document.getElementById('stop-btn');

        // 输入框内容变化时启用/禁用执行按钮
        debugInput.addEventListener('input', function() {
            debugRunBtn.disabled = !this.value.trim();
        });

        // Ctrl+Enter 快捷键执行
        debugInput.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter' && !debugRunBtn.disabled && !debugRunning) {
                runDebug();
            }
        });

        function toggleDebug() {
            debugOpen = !debugOpen;
            document.getElementById('debug-panel').classList.toggle('open', debugOpen);
            // 打开调试时隐藏状态文字和停止按钮，关闭时恢复
            debugStatusText.style.display = debugOpen ? 'none' : '';
            debugStopBtn.style.display = debugOpen ? 'none' : '';
            if (debugOpen) debugInput.focus();
        }

        async function runDebug() {
            if (debugRunning) return;
            var raw = debugInput.value.trim();
            if (!raw) return;

            debugRunning = true;
            debugRunBtn.disabled = true;
            debugRunBtn.textContent = '⏳';
            debugStatus.textContent = '执行中...';
            debugStatus.style.color = '#6a6a8a';
            debugOutput.classList.remove('show', 'error');
            debugOutput.textContent = '';

            var command;
            if (raw.startsWith('{')) {
                try { command = JSON.parse(raw); } catch(e) {
                    showDebugError('JSON解析失败');
                    return;
                }
            } else {
                showDebugError('请输入JSON');
                debugRunning = false;
                debugRunBtn.textContent = '▶';
                debugRunBtn.disabled = false;
                return;
            }

            try {
                var result = await ipcRenderer.invoke('winapi-invoke', command);
                var outStr = JSON.stringify(result, null, 2);
                // 输出到控制台（太长的内容在面板里显示不下）
                ipcRenderer.send('ctrl-debug-log', outStr);
                debugOutput.textContent = outStr.length > 100 ? '结果已输出到终端控制台 (太长，此处截断)' : outStr;
                debugOutput.classList.add('show');
                debugOutput.classList.remove('error');

                if (result.success) {
                    debugStatus.textContent = '✓';
                    debugStatus.style.color = '#34d399';
                } else {
                    debugStatus.textContent = '✗';
                    debugStatus.style.color = '#ef4444';
                    debugOutput.classList.add('error');
                }
            } catch(e) {
                showDebugError(e.message);
            } finally {
                debugRunning = false;
                debugRunBtn.textContent = '▶';
                debugRunBtn.disabled = !debugInput.value.trim();
            }
        }

        function showDebugError(msg) {
            debugOutput.textContent = msg;
            debugOutput.classList.add('show', 'error');
            debugStatus.textContent = '✗';
            debugStatus.style.color = '#ef4444';
            debugRunning = false;
            debugRunBtn.textContent = '▶';
            debugRunBtn.disabled = false;
        }
    </script>
</body>
</html>
